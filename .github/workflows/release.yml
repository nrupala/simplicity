name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  pwa:
    name: Build PWA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: simplicity-web/package-lock.json

      - name: Install dependencies
        run: |
          cd simplicity-web
          npm install

      - name: Build
        run: |
          cd simplicity-web
          npm run build

      - name: Copy dist to release
        run: |
          mkdir -p release/pwa
          cp -r simplicity-web/dist/* release/pwa/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pwa
          path: release

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: pwa
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: pwa
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Simplicity AI ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Simplicity AI - Local AI Model Binder
            
            ### Downloads
            - PWA: Host the pwa folder on GitHub Pages or any static hosting
            
            ### Features
            - Local AI (Ollama, LM Studio) - No API keys!
            - Cloud AI (OpenAI, Anthropic, Google)
            
            ### Getting Started
            1. Install Ollama: https://ollama.ai
            2. `ollama pull llama3`
            3. Open index.html in your browser!
            
            ### Note
            Java build coming soon. For now, use the PWA version.
          files: |
            pwa/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
