name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  JAVA_VERSION: '21'

jobs:
  # ===========================================
  # BUILD JAVA
  # ===========================================
  build-java:
    name: Build Java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          mvn clean package -DskipTests -pl simplicity-core,simplicity-model-binder -am

      - name: List JARs
        run: |
          find . -name "*.jar" -path "*/target/*" | head -10

      - name: Upload JAR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simplicity-jars
          path: |
            simplicity-core/target/*.jar
            simplicity-model-binder/target/*.jar
          retention-days: 30

  # ===========================================
  # BUILD PWA
  # ===========================================
  build-pwa:
    name: Build PWA
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build PWA
        run: |
          cd simplicity-web
          npm install
          npm run build

      - name: Upload PWA
        uses: actions/upload-artifact@v4
        with:
          name: pwa-dist
          path: simplicity-web/dist
          retention-days: 30

  # ===========================================
  # CREATE RELEASE
  # ===========================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: simplicity-jars
          path: jars

      - name: Download PWA
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pwa-dist
          path: pwa

      - name: Show files
        run: |
          echo "JAR files:"
          ls -la jars/
          echo "PWA files:"
          ls -la pwa/ 2>/dev/null || echo "No PWA"

      - name: Create Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'ENDOFNOTES'
          # Simplicity AI v1.0.0

          ## Downloads

          ### Java JAR Files
          - `simplicity-core-*.jar` - Core domain models
          - `simplicity-model-binder-*.jar` - Model bindings (Ollama, LM Studio, etc.)

          ### Usage
          ```bash
          java -jar simplicity-model-binder-*.jar
          ```

          ## What's Included

          ### Local AI Support
          - **Ollama** (localhost:11434) - 20+ models
          - **LM Studio** (localhost:1234) - GGUF models

          ### Cloud Providers
          - OpenAI (GPT-4, o1)
          - Anthropic (Claude)
          - Google (Gemini)
          - And more...

          ## Getting Started

          1. Install [Ollama](https://ollama.ai)
          2. Pull a model: `ollama pull llama3`
          3. Run the JAR and chat with local AI!

          ## Web App (PWA)
          
          The PWA folder can be hosted on GitHub Pages or any web server.
          It connects to local Ollama/LM Studio running on your machine.
          ENDOFNOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Simplicity AI ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            jars/*.jar
            pwa/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
