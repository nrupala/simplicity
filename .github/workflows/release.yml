name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ===========================================
  # BUILD JAVA
  # ===========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests -pl simplicity-core,simplicity-model-binder -am

      - name: Copy JARs
        run: |
          mkdir -p release
          cp simplicity-core/target/*.jar release/
          cp simplicity-model-binder/target/*.jar release/

      - name: Build PWA
        run: |
          cd simplicity-web
          npm install
          npm run build
          cd ..
          mkdir -p release/pwa
          cp -r simplicity-web/dist/* release/pwa/

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release

  # ===========================================
  # CREATE RELEASE
  # ===========================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: release
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Simplicity AI ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Downloads
            
            ### JAR Files
            Run: `java -jar simplicity-model-binder-*.jar`
            
            ### PWA
            Host the pwa folder on any web server.
            
            ## Features
            - Local AI (Ollama, LM Studio) - No API keys!
            - Cloud AI (OpenAI, Anthropic, Google)
            
            ## Getting Started
            1. Install Ollama: https://ollama.ai
            2. Pull model: `ollama pull llama3`
            3. Run the JAR!
          files: |
            *.jar
            pwa/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
