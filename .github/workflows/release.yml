name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Build
        run: |
          mvn -v
          mvn clean compile -DskipTests -pl simplicity-core,simplicity-model-binder -am -B

      - name: Package
        run: |
          mvn package -DskipTests -pl simplicity-core,simplicity-model-binder -am -B

      - name: Copy artifacts
        run: |
          mkdir -p release
          cp simplicity-core/target/*.jar release/ 2>/dev/null || true
          cp simplicity-model-binder/target/*.jar release/ 2>/dev/null || true
          ls -la release/

      - name: Build PWA
        run: |
          cd simplicity-web
          npm install
          npm run build
          cd ..
          mkdir -p release/pwa
          cp -r simplicity-web/dist/* release/pwa/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: release
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Simplicity AI ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Simplicity AI - Local AI Model Binder
            
            ### Downloads
            - JAR files: Run with `java -jar simplicity-*.jar`
            - PWA: Host the pwa folder on GitHub Pages
            
            ### Features
            - Local AI (Ollama, LM Studio) - No API keys!
            - Cloud AI (OpenAI, Anthropic, Google)
            
            ### Getting Started
            1. Install Ollama: https://ollama.ai
            2. `ollama pull llama3`
            3. Run the JAR!
          files: |
            *.jar
            pwa/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
