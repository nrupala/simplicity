name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.9'

jobs:
  # ===========================================
  # VERSION CHECK
  # ===========================================
  version-check:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version
        id: version
        run: |
          VERSION="debug"
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

  # ===========================================
  # BUILD JAVA (Main Release)
  # ===========================================
  build-java:
    name: Build Java
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Download Maven
        run: |
          curl -fsSL https://archive.apache.org/dist/maven/maven-3/${{ env.MAVEN_VERSION }}/binaries/apache-maven-${{ env.MAVEN_VERSION }}-bin.tar.gz | tar -xzf - -C /tmp
          echo "/tmp/apache-maven-${{ env.MAVEN_VERSION }}/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          echo "Building simplicity-core and simplicity-model-binder..."
          mvn clean package -DskipTests -pl simplicity-core,simplicity-model-binder -am -q
          ls -la simplicity-core/target/
          ls -la simplicity-model-binder/target/

      - name: Upload JAR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-jars
          path: |
            simplicity-core/target/*.jar
            simplicity-model-binder/target/*.jar
          retention-days: 30

  # ===========================================
  # BUILD PWA (Optional)
  # ===========================================
  build-pwa:
    name: Build PWA
    runs-on: ubuntu-latest
    needs: version-check
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        run: |
          cd simplicity-web
          npm install --silent
          npm run build || echo "PWA build failed, continuing..."

      - name: Upload PWA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pwa-dist
          path: simplicity-web/dist
          retention-days: 30

  # ===========================================
  # BUILD ANDROID (Optional)
  # ===========================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: version-check
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd simplicity-android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode=none || echo "Android build failed"

      - name: Find APK
        run: |
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: simplicity-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ===========================================
  # CREATE RELEASE
  # ===========================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version-check, build-java]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: java-jars
          path: jars

      - name: Download PWA artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pwa-dist
          path: pwa
          if-no-files-found: ignore

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: android-apk
          path: android
          if-no-files-found: ignore

      - name: List files
        run: |
          echo "=== JAR Files ==="
          ls -la jars/
          echo "=== PWA Files ==="
          ls -la pwa/ 2>/dev/null || echo "No PWA files"
          echo "=== APK Files ==="
          ls -la android/ 2>/dev/null || echo "No APK files"

      - name: Create Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # Simplicity AI - Local AI Model Binder
          
          ## Downloads

          ### Java JAR Files
          Run with: `java -jar <jar-file>`

          ### PWA (Progressive Web App)
          Host the PWA folder on GitHub Pages or any web server.

          ### Android APK
          Install the APK on your Android device.

          ## Getting Started

          1. Install Ollama from https://ollama.ai
          2. Pull a model: `ollama pull llama3`
          3. Run: `java -jar simplicity-model-binder-*.jar`

          ## Features

          - Local AI support (no API keys required)
          - Ollama integration (20+ models)
          - LM Studio integration (GGUF format)
          - Cross-platform: Windows, macOS, Linux, Web, Android
          - Streaming responses
          - Health monitoring
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-check.outputs.version }}
          name: Simplicity AI ${{ needs.version-check.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            jars/*.jar
            pwa/**/*
            android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
