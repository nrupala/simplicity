name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  JAVA_VERSION: '21'

jobs:
  # ===========================================
  # COPY ARTIFACTS (Already built locally)
  # ===========================================
  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build Java
        run: |
          mvn clean install -DskipTests -pl simplicity-core,simplicity-model-binder -am

      - name: Create output dir
        run: mkdir -p release

      - name: Copy JARs
        run: |
          cp simplicity-core/target/*.jar release/
          cp simplicity-model-binder/target/*.jar release/
          ls -la release/

      - name: Build PWA
        if: success()
        run: |
          cd simplicity-web
          npm install
          npm run build
          cd ..
          cp -r simplicity-web/dist release/pwa

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release

  # ===========================================
  # CREATE RELEASE
  # ===========================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-and-package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release
        uses: actions/download-artifact@v4
        with:
          name: release
          path: release

      - name: Show files
        run: |
          echo "=== Release Files ==="
          ls -laR release/

      - name: Create Release Notes
        run: |
          cat > release/RELEASE_NOTES.md << 'END'
          # Simplicity AI
          
          ## Downloads

          ### JAR Files
          Run with: `java -jar simplicity-model-binder-*.jar`

          ## Features

          - Local AI (Ollama, LM Studio)
          - Cloud AI (OpenAI, Anthropic, Google)
          - No API keys needed for local!

          ## Getting Started

          1. Install Ollama: https://ollama.ai
          2. Pull model: `ollama pull llama3`
          3. Run JAR!
          END

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Simplicity AI ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: release/RELEASE_NOTES.md
          files: |
            release/*.jar
            release/pwa/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
