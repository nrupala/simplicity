name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ===========================================
  # BUILD
  # ===========================================
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven Wrapper
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          chmod +x mvnw
          ./mvnw --version
          ./mvnw clean compile -DskipTests -pl simplicity-core,simplicity-model-binder -am
          ./mvnw package -DskipTests -pl simplicity-core,simplicity-model-binder -am

      - name: Copy artifacts
        run: |
          mkdir -p release
          cp simplicity-core/target/*.jar release/
          cp simplicity-model-binder/target/*.jar release/
          ls -la release/

      - name: Build PWA
        run: |
          cd simplicity-web
          npm install
          npm run build
          cd ..
          mkdir -p release/pwa
          cp -r simplicity-web/dist/* release/pwa/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release

  # ===========================================
  # RELEASE
  # ===========================================
  release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: release
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Simplicity AI ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Simplicity AI - Local AI Model Binder
            
            ### Downloads
            - JAR files: Run with `java -jar simplicity-*.jar`
            - PWA: Host the pwa folder on GitHub Pages
            
            ### Features
            - Local AI (Ollama, LM Studio) - No API keys!
            - Cloud AI (OpenAI, Anthropic, Google)
            
            ### Getting Started
            1. Install Ollama: https://ollama.ai
            2. `ollama pull llama3`
            3. Run the JAR!
          files: |
            *.jar
            pwa/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
