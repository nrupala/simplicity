name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.9'

jobs:
  # ===========================================
  # VERSION CHECK
  # ===========================================
  version-check:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=debug" >> $GITHUB_OUTPUT
          fi
          echo "Version: ${{ steps.version.outputs.version }}"

  # ===========================================
  # BUILD ALL PLATFORMS
  # ===========================================
  build-all:
    name: Build All Platforms
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Maven
        run: |
          curl -fsSL https://dlcdn.apache.org/maven/maven-3/${{ env.MAVEN_VERSION }}/binaries/apache-maven-${{ env.MAVEN_VERSION }}-bin.tar.gz | tar -xzf - -C /tmp
          echo "/tmp/apache-maven-${{ env.MAVEN_VERSION }}/bin" >> $GITHUB_PATH

      - name: Build Java Modules
        run: |
          mvn clean package -DskipTests -pl simplicity-core,simplicity-model-binder -am

      - name: Upload JAR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-artifacts
          path: |
            simplicity-core/target/*.jar
            simplicity-model-binder/target/*.jar
          retention-days: 30

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: simplicity-web/package-lock.json

      - name: Build PWA
        run: |
          cd simplicity-web
          npm install
          npm run build

      - name: Upload PWA
        uses: actions/upload-artifact@v4
        with:
          name: pwa-dist
          path: simplicity-web/dist
          retention-days: 30

  # ===========================================
  # BUILD ANDROID
  # ===========================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd simplicity-android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 || true

      - name: Find and Upload APK
        run: |
          find . -name "*.apk" -type f -exec ls -la {} \;
          cp $(find . -name "*.apk" -type f | head -1) ./simplicity-debug.apk 2>/dev/null || echo "No APK found"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: |
            simplicity-android/app/build/outputs/apk/debug/*.apk
            simplicity-android/app/build/outputs/apk/release/*.apk
            ./simplicity-debug.apk
          retention-days: 30

  # ===========================================
  # CREATE RELEASE
  # ===========================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-all, build-android]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: |
          echo "=== Artifacts ==="
          ls -laR artifacts/

      - name: Generate Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # Simplicity AI v1.0.0

          ## What's New
          
          - **Local AI Support**: Works with Ollama and LM Studio
          - **Multiple Platforms**: Windows, macOS, Linux, Web, Android
          - **No API Keys Required**: Uses local models for free inference

          ## Downloads

          ### Java JAR (Cross-platform)
          Run with: `java -jar simplicity-*.jar`

          ### Web App (PWA)
          Host the PWA files on any web server or GitHub Pages.

          ### Android APK
          Install on your Android device.

          ## Getting Started

          1. Install Ollama from https://ollama.ai
          2. Pull a model: `ollama pull llama3`
          3. Run the app and chat with local AI!

          ## Local Models Supported
          
          - Ollama (20+ models)
          - LM Studio (GGUF format)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-all.outputs.version }}
          name: Simplicity AI ${{ needs.build-all.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/java-artifacts/**/*.jar
            artifacts/pwa-dist/**/*
            artifacts/android-apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
