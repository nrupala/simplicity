name: Java Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven Wrapper
        run: |
          chmod +x mvnw
          ./mvnw --version
          ./mvnw clean compile -DskipTests -B

      - name: Package
        run: ./mvnw package -DskipTests -B

      - name: Copy artifacts
        run: |
          mkdir -p release
          find . -name "*.jar" -path "*/target/*" -exec cp {} release/ \; 2>/dev/null || true
          ls -la release/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: java-release
          path: release
